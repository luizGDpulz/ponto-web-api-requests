info:
  name: Listar Bancos
  type: http
  seq: 3
http:
  method: GET
  url: '{{base_url_auth}}/ContasSecullumExterno/ListarBancos'
  headers:
    - name: Accept
      value: application/json
  auth: inherit
runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status 200", function () {
          expect(res.status).to.equal(200);
        });

        if (Array.isArray(res.body) && res.body.length > 0) {
          const first = res.body[0];
          if (first.id !== undefined && first.id !== null) {
            bru.setVar("selected_bank_id", String(first.id));
          }
          if (first.identificador) {
            bru.setVar("selected_bank_identificador", String(first.identificador).replace(/[^a-zA-Z0-9]/g, ""));
          }
          if (first.nome) {
            bru.setVar("selected_bank_name", String(first.nome));
          }
        }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: >-
  Lista os bancos disponíveis para o token atual. O teste salva o primeiro retorno em `selected_bank_id`,
  `selected_bank_identificador` e `selected_bank_name`.
