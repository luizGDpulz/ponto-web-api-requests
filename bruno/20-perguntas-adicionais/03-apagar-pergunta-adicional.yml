info:
  name: Apagar pergunta adicional
  type: http
  seq: 3
http:
  method: DELETE
  url: '{{base_url_api}}/IntegracaoExterna/PerguntasAdicionais?descricao={{descricao}}&grupo={{grupo}}'
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
  params:
    - name: descricao
      value: '{{descricao}}'
      type: query
    - name: grupo
      value: '{{grupo}}'
      type: query
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: 'Tag: Perguntas Adicionais. OperationId: ApagarPerguntaAdicionalAsync'
