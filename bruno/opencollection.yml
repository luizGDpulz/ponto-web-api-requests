docs: >-
  Collection validada contra o Swagger vivo e o manual PDF da integração externa do Secullum Ponto Web.


  Fluxo recomendado:

  1. Gerar o token em `Autenticação e Seleção de Banco/Token`.

  2. Opcionalmente consultar `Reivindicações do Token`.

  3. Listar bancos e definir `selected_bank_id`.

  4. Executar as rotas de `IntegracaoExterna` com `Authorization: Bearer {{access_token}}` e o header
  `secullumidbancoselecionado`.


  Divergências observadas entre as fontes:

  - O manual PDF ainda descreve `IntegracaoExterna/Pendencias`, mas essa rota não aparece no swagger atual.

  - O swagger atual expõe `GravarLogsIniciarBkp` e `PontoOffline/AssinaturaArquivo/Assinar`, que não aparecem no PDF.

  - Em caso de conflito entre PDF e API viva, esta collection prioriza o swagger atual.
