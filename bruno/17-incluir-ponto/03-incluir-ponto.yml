info:
  name: Incluir ponto
  type: http
  seq: 3
http:
  method: POST
  url: '{{base_url_api}}/IntegracaoExterna/InclusaoPonto/Incluir'
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "pis": "{{funcionario_pis}}",
        "cpf": "{{funcionario_cpf}}",
        "endereco": "Rua Exemplo, 100",
        "latitude": -30.0346,
        "longitude": -51.2177,
        "precisao": 10,
        "dataHora": "2024-04-17T14:30",
        "justificativa": "ATEST",
        "foto": "",
        "identificacaoDispositivo": "android-sm-s911b",
        "marcacaoOffline": true
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: >-
  Cria uma nova inclusão de ponto. Se `marcacaoOffline=true`, informe `dataHora` no formato `yyyy-MM-ddTHH:mm`; caso
  contrário, a API usa a data/hora do servidor.
