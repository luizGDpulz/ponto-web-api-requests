info:
  name: Listar batidas
  type: http
  seq: 1
http:
  method: GET
  url: >-
    {{base_url_api}}/IntegracaoExterna/Batidas?DataInicio={{data_inicio}}&DataFim={{data_fim}}&FuncionarioPis={{funcionario_pis}}&FuncionarioCpf={{funcionario_cpf}}&EmpresaDocumento={{empresa_documento}}&HoraInicio={{hora_inicio}}&HoraFim={{hora_fim}}
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
  params:
    - name: DataInicio
      value: '{{data_inicio}}'
      type: query
    - name: DataFim
      value: '{{data_fim}}'
      type: query
    - name: FuncionarioPis
      value: '{{funcionario_pis}}'
      type: query
    - name: FuncionarioCpf
      value: '{{funcionario_cpf}}'
      type: query
    - name: EmpresaDocumento
      value: '{{empresa_documento}}'
      type: query
    - name: HoraInicio
      value: '{{hora_inicio}}'
      type: query
    - name: HoraFim
      value: '{{hora_fim}}'
      type: query
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: >-
  Listar batidas dos funcionários. Filtros opcionais: Hora inicial/final, PIS, CPF, empresa, equipamento. Dados retornam
  tipo (Original/Manual/Pré-assinalado/Desconsiderado) e origem (Relógio/Manual/Integração Externa).
