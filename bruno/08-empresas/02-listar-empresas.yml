info:
  name: Listar empresas
  type: http
  seq: 2
http:
  method: GET
  url: '{{base_url_api}}/IntegracaoExterna/Empresas?cnpjCpf={{empresa_documento}}'
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
  params:
    - name: cnpjCpf
      value: '{{empresa_documento}}'
      type: query
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: Listar empresas. Filtro opcional por CNPJ/CPF.
