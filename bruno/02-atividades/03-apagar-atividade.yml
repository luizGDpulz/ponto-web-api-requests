info:
  name: Apagar atividade
  type: http
  seq: 3
http:
  method: DELETE
  url: '{{base_url_api}}/IntegracaoExterna/Atividades?descricao={{descricao}}'
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
  params:
    - name: descricao
      value: '{{descricao}}'
      type: query
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: 'Apagar atividade pela descrição. Campo chave: descrição.'
