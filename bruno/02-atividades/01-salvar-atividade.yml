info:
  name: Salvar atividade
  type: http
  seq: 1
http:
  method: POST
  url: '{{base_url_api}}/IntegracaoExterna/Atividades'
  headers:
    - name: Accept
      value: application/json
    - name: secullumidbancoselecionado
      value: '{{selected_bank_id}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "descricao": "{{atividade_descricao}}",
        "descricaoAbreviada": "ATV EX",
        "tipoDeAtividade": 0
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
docs: 'Salvar nova atividade. Campos Obrigatórios: descrição (50c), abreviada (50c), tipo (0=Início e Fim, 1=Registro único).'
